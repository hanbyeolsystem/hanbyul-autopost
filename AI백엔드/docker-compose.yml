services:
  hanbyul-ai:
    build: .
    container_name: hanbyul-ai
    restart: unless-stopped
    ports:
      - "8787:8787"
    # key.txt를 컨테이너 안으로 마운트(읽기전용). 키 바꾸면 컨테이너만 재시작.
    # NAS에선 같은 폴더(/volume1/docker/hanbyul-ai/key.txt) 기준으로 잡힙니다.
    volumes:
      - ./key.txt:/app/key.txt:ro
    environment:
      PORT: "8787"
      # 운영 시 콘솔이 올라가는 도메인으로 제한 권장 (예: https://post.한별도메인.com)
      ALLOW_ORIGIN: "*"
